[changelog]
header = "# Changelog\n\nAll notable changes to Refloom.\n"
body = """
{%- macro remote_url() -%}
  https://github.com/dora56/refloom
{%- endmacro -%}

{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | trim }}\
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = false
split_commits = false
commit_parsers = [
  { message = "^Add", group = "Added" },
  { message = "^Implement", group = "Added" },
  { message = "^Support", group = "Added" },
  { message = "^Fix", group = "Fixed" },
  { message = "^Update", group = "Changed" },
  { message = "^Refactor", group = "Changed" },
  { message = "^Improve", group = "Changed" },
  { message = "^Clean", group = "Changed" },
  { message = "^Remove", group = "Removed" },
  { message = "^Delete", group = "Removed" },
  { message = "^Merge", skip = true },
  { message = "^Co-Authored", skip = true },
]
protect_breaking_commits = false
filter_unconventional = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"

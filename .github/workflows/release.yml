name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha256: ${{ steps.sha.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Extract release notes from CHANGELOG
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | sed '$d' > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "## ${GITHUB_REF_NAME}" > RELEASE_NOTES.md
          fi
          cat RELEASE_NOTES.md
      - name: Build distribution
        run: make dist
      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 dist/*.zip | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          body_path: RELEASE_NOTES.md
          append_body: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          script: |
            const version = '${{ needs.release.outputs.version }}';
            const sha256 = '${{ needs.release.outputs.sha256 }}';
            const owner = 'dora56';
            const repo = 'homebrew-tap';
            const path = 'Formula/refloom.rb';

            // Get current file
            const { data: file } = await github.rest.repos.getContent({
              owner, repo, path,
            });
            const content = Buffer.from(file.content, 'base64').toString('utf8');

            // Replace version and sha256
            const updated = content
              .replace(/version "[^"]+"/, `version "${version}"`)
              .replace(/sha256 "[^"]+"/, `sha256 "${sha256}"`);

            if (updated === content) {
              core.info('Formula already up to date');
              return;
            }

            // Commit update
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `Update refloom to v${version}`,
              content: Buffer.from(updated).toString('base64'),
              sha: file.sha,
            });
            core.info(`Updated formula to v${version} (sha256: ${sha256})`);

  e2e:
    needs: release
    uses: ./.github/workflows/e2e-install.yml

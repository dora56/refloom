name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Extract release notes from CHANGELOG
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | sed '$d' > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "## ${GITHUB_REF_NAME}" > RELEASE_NOTES.md
          fi
          cat RELEASE_NOTES.md
      - name: Build distribution
        run: make dist
      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 dist/*.zip | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          body_path: RELEASE_NOTES.md
          append_body: true
      - name: Print Homebrew formula update info
        run: |
          echo "::notice::Update homebrew-tap Formula/refloom.rb with sha256 '${{ steps.sha.outputs.sha256 }}'"

  e2e:
    needs: release
    uses: ./.github/workflows/e2e-install.yml

name: PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff stats
        id: diff
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}

          FILES=$(git diff --name-only "$BASE_SHA"..."$HEAD_SHA")
          FILE_COUNT=$(echo "$FILES" | wc -l | tr -d ' ')
          GO_COUNT=$(echo "$FILES" | grep -c '\.go$' || true)
          PY_COUNT=$(echo "$FILES" | grep -c '\.py$' || true)

          # Detect active lenses
          LENSES="code-quality, regression/QA"
          echo "$FILES" | grep -qE '(auth|token|secret|key)' && LENSES="$LENSES, security"
          echo "$FILES" | grep -qE '(search|embedding|db/)' && LENSES="$LENSES, performance"
          echo "$FILES" | grep -qE 'internal/' && LENSES="$LENSES, architecture"

          echo "file_count=$FILE_COUNT" >> "$GITHUB_OUTPUT"
          echo "go_count=$GO_COUNT" >> "$GITHUB_OUTPUT"
          echo "py_count=$PY_COUNT" >> "$GITHUB_OUTPUT"
          echo "lenses=$LENSES" >> "$GITHUB_OUTPUT"

          # Collect findings
          FINDINGS=""

          # Check for common issues
          if git diff "$BASE_SHA"..."$HEAD_SHA" | grep -q 'TODO\|FIXME\|HACK'; then
            FINDINGS="${FINDINGS}\n| F-001 | code-quality | Info | diff | open | New TODO/FIXME/HACK comment detected |"
          fi

          if git diff "$BASE_SHA"..."$HEAD_SHA" | grep -q 'fmt\.Print'; then
            FINDINGS="${FINDINGS}\n| F-002 | code-quality | Warning | diff | open | fmt.Print usage (use slog for production logging) |"
          fi

          if git diff "$BASE_SHA"..."$HEAD_SHA" -- '*.go' | grep -q 'panic('; then
            FINDINGS="${FINDINGS}\n| F-003 | code-quality | Critical | diff | open | panic() in non-main code |"
          fi

          if git diff "$BASE_SHA"..."$HEAD_SHA" -- '*.go' | grep -q 'os\.Exit'; then
            FINDINGS="${FINDINGS}\n| F-004 | code-quality | Warning | diff | open | os.Exit outside main (use error returns) |"
          fi

          # Check test coverage
          CHANGED_SRC=$(echo "$FILES" | grep -E '\.(go|py)$' | grep -v '_test\.' | grep -v 'test_' || true)
          CHANGED_TESTS=$(echo "$FILES" | grep -E '(_test\.go|test_.*\.py)' || true)
          if [ -n "$CHANGED_SRC" ] && [ -z "$CHANGED_TESTS" ]; then
            FINDINGS="${FINDINGS}\n| F-005 | regression/QA | Warning | diff | open | Source files changed but no test files updated |"
          fi

          echo "findings<<FINDINGS_EOF" >> "$GITHUB_OUTPUT"
          echo -e "$FINDINGS" >> "$GITHUB_OUTPUT"
          echo "FINDINGS_EOF" >> "$GITHUB_OUTPUT"

      - name: Post review comment
        uses: actions/github-script@v8
        with:
          script: |
            const findings = `${{ steps.diff.outputs.findings }}`.trim();
            const findingsTable = findings
              ? `| ID | Lens | Severity | Location | Status | Issue |\n| --- | --- | --- | --- | --- | --- |\n${findings}`
              : '_No automated findings._';

            const hasBlocker = findings.includes('Critical');
            const hasWarning = findings.includes('Warning');
            const status = hasBlocker ? 'BLOCKED' : (hasWarning ? 'BLOCKED' : 'PASS');
            const promotion = hasBlocker ? 'blocked' : (hasWarning ? 'needs review' : 'ready');

            const body = `## Code Review Report

            ### Scope
            - Files changed: ${{ steps.diff.outputs.file_count }} (Go: ${{ steps.diff.outputs.go_count }}, Python: ${{ steps.diff.outputs.py_count }})
            - Active Lenses: ${{ steps.diff.outputs.lenses }}

            ### Automated Findings
            ${findingsTable}

            ### Loop Status
            - Status: **${status}**
            - Promotion: **${promotion}**
            - Next Step: ${hasBlocker ? 'Fix critical findings before merge' : hasWarning ? 'Review warnings and resolve or accept as risk' : 'Ready for manual review and merge'}

            ---
            _Automated review by code-review-remediation-workflow. Manual review with full lens activation recommended for complex changes._`;

            // Find existing bot comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.body.includes('## Code Review Report') && c.user.type === 'Bot'
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

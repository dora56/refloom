name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - '**/*.py'
              - 'go.mod'
              - 'go.sum'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Makefile'
              - '.golangci.yml'

  go-lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Run golangci-lint
        run: make lint
      - name: Check go fix modernizations
        run: make fix-check

  go-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: make test

  python-lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - name: Run ruff + pyright
        run: make lint-python

  python-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - name: Run pytest
        run: make test-python

  build:
    needs: [changes, go-lint, go-test, python-lint, python-test]
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build binary
        run: make build
      - name: Verify binary
        run: ./bin/refloom version

  ci-status:
    runs-on: ubuntu-latest
    if: always()
    needs: [changes, go-lint, go-test, python-lint, python-test, build]
    steps:
      - name: Check CI results
        run: |
          if [[ "${{ needs.changes.outputs.code }}" != "true" ]]; then
            echo "No code changes (docs/CI config only), skipping code checks"
            exit 0
          fi
          for result in "${{ needs.go-lint.result }}" "${{ needs.go-test.result }}" \
                        "${{ needs.python-lint.result }}" "${{ needs.python-test.result }}" \
                        "${{ needs.build.result }}"; do
            if [[ "$result" != "success" ]]; then
              echo "Job failed: $result"
              exit 1
            fi
          done
          echo "All code checks passed"
